<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search real golf courses anywhere in the world using live OpenStreetMap data — see address, public/private status, and save favorites.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛳</text></svg>">
  <title>Golf Course Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⛳ Golf Course Finder</h1>
    <p id="subtitle">Golf courses near Boston, MA</p>
  </header>

  <main>
    <form id="search-form">
      <input type="text" id="search-input" placeholder="Search a city or region (e.g. Pebble Beach, CA)" aria-label="Search location">
      <button type="submit">Search</button>
      <button type="button" id="locate-btn">📍 Near me</button>
    </form>

    <div id="recent-searches" class="recent-searches"></div>

    <div class="view-toggle">
      <button id="favorites-toggle" type="button">☆ Favorites (0)</button>
    </div>

    <div id="status" aria-live="polite">
      <div id="spinner" class="spinner" hidden></div>
      <p id="message"></p>
      <button id="retry-btn" type="button" hidden>Try again</button>
    </div>

    <p id="results-count"></p>
    <div id="results" class="course-grid"></div>
  </main>

  <footer>
    <p>Course data © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap contributors</a> (ODbL)</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
